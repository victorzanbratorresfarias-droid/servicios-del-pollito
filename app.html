<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐥 Comunidad Pollito</title>
  <style>
    :root {
      --bg-main: #36393f;
      --bg-side: #2f3136;
      --bg-input: #40444b;
      --text-main: #dcddde;
      --text-muted: #72767d;
      --accent: #5865f2;
      --accent-hover: #4752c4;
      --danger: #ed4245;
      --border: #202225;
      --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: var(--font-family);
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      background-color: var(--bg-side);
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    header h1 { margin: 0; font-size: 1.1rem; color: white; }

    .nav-buttons { display: flex; gap: 8px; }

    /* BOTONES ESTILIZADOS */
    button {
      border: none;
      border-radius: 4px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }

    .btn-danger { background: transparent; color: var(--text-muted); }
    .btn-danger:hover { background: var(--danger); color: white; }

    .btn-user { background: #4f545c; color: white; }
    .btn-user:hover { background: #686d73; }

    /* CHAT CORREGIDO */
    #chat-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column; /* Cambiado de column-reverse para evitar bugs de orden */
    }

    .mensaje-container {
      display: flex;
      padding: 4px 20px;
    }

    .mensaje-container:hover { background-color: rgba(0,0,0,0.1); }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-right: 15px;
      flex-shrink: 0;
    }

    .user-name { font-weight: 600; color: white; margin-right: 8px; }
    .rol-tag { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: bold; }
    .message-text { font-size: 0.95rem; white-space: pre-wrap; word-break: break-word; }

    /* ÁREA DE INPUT */
    #input-wrapper { padding: 0 20px 24px; }
    #input-area {
      background: var(--bg-input);
      border-radius: 8px;
      display: flex;
      padding: 2px 15px;
    }

    #msg {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      padding: 12px 0;
      outline: none;
    }

    #errorBox {
      display: none;
      background: var(--danger);
      color: white;
      padding: 10px;
      text-align: center;
      position: fixed;
      top: 0; width: 100%; z-index: 100;
    }
  </style>
</head>
<body>

<div id="errorBox"></div>

<header>
  <h1>Comunidad Pollito</h1>
  <div class="nav-buttons">
    <button class="btn-primary" onclick="window.location='foro.html'">📌 Foro</button>
    <button class="btn-user" onclick="window.location='cuenta.html'">👤 Mi cuenta</button>
    <button class="btn-danger" onclick="logout()">Salir</button>
  </div>
</header>

<div id="chat-wrapper">
  <div id="chat"></div>
</div>

<div id="input-wrapper">
  <div id="input-area">
    <input id="msg" placeholder="Enviar mensaje a #comunidad" onkeypress="handleEnter(event)">
    <button class="btn-primary" style="background:transparent; color:var(--accent)" onclick="send()">ENVIAR</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCVQyiAqSFu00dxVxBv3UVv6qbPx_pPlC4",
  authDomain: "serviciosdelpollito-d7c13.firebaseapp.com",
  projectId: "serviciosdelpollito-d7c13"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();


}

// LOGIN CHECK
auth.onAuthStateChanged(user => {
  if (!user) window.location = "index.html";
  else cargarMensajes();
});

function cargarMensajes() {
  const chatDiv = document.getElementById("chat");
  const wrapper = document.getElementById("chat-wrapper");

  db.collection("messages").orderBy("fecha").onSnapshot(snapshot => {
    chatDiv.innerHTML = "";
    snapshot.forEach(doc => {
      const m = doc.data();
      chatDiv.innerHTML += `
        <div class="mensaje-container">
          <img src="${m.foto}" class="user-avatar">
          <div>
            <div style="margin-bottom:2px">
              <span class="user-name">${m.nombre}</span>
              <span class="rol-tag">${m.rol}</span>
            </div>
            <div class="message-text">${m.texto}</div>
          </div>
        </div>
      `;
    });
    wrapper.scrollTop = wrapper.scrollHeight;
  });
}

function send() {
  const input = document.getElementById("msg");
  const valor = input.value.trim();
  if(!valor) return;

  const textoFinal = censurar(valor);
  const user = auth.currentUser;

  db.collection("users").doc(user.uid).get().then(doc => {
    const u = doc.data();
    db.collection("messages").add({
      texto: textoFinal,
      nombre: u.nombre,
      foto: u.foto,
      rol: u.rol,
      fecha: Date.now()
    });
  });
  input.value = "";
}

// ARREGLO DE TECLA ENTER
function handleEnter(e) {
  if (e.key === 'Enter') send();
}

function logout() { auth.signOut().then(() => window.location = "index.html"); }

function mostrarError(msg) {
  const eb = document.getElementById("errorBox");
  eb.innerText = "⚠️ " + msg;
  eb.style.display = "block";
  setTimeout(() => eb.style.display = "none", 5000);
}
</script>
</body>
</html>
