<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polli Chat - Oficial</title>
    <style>
        :root { --bg-main: #36393f; --bg-side: #2f3136; --text: #dcddde; --accent: #5865f2; --danger: #ed4245; }
        body { background: var(--bg-main); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { 
            background: var(--bg-side); 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #202225; 
        }

        .nav-buttons { display: flex; gap: 10px; }
        
        /* Estilos de los botones */
        button { border: none; border-radius: 4px; padding: 8px 15px; cursor: pointer; font-weight: bold; color: white; }
        .btn-blue { background: var(--accent); }
        
        /* EL BOTÓN MÁGICO: Empieza invisible (display: none) */
        #admin-link { 
            background: var(--danger); 
            display: none; 
            box-shadow: 0 0 10px rgba(237, 66, 69, 0.3);
        }

        #chat-wrapper { flex: 1; overflow-y: auto; padding: 20px; }
        #input-area { padding: 20px; background: var(--bg-side); display: flex; gap: 10px; }
        input { flex: 1; background: #40444b; border: none; padding: 12px; color: white; border-radius: 5px; outline: none; }
        
        .msg-box { margin-bottom: 15px; }
        .u-name { font-weight: bold; color: #fff; display: block; }
    </style>
</head>
<body>

<header>
    <h1># polli-chat</h1>
    <div class="nav-buttons">
        <button id="admin-link" onclick="window.location='admin.html'">👑 PANEL ADMIN</button>
        
        <button class="btn-blue" onclick="window.location='foro.html'">📌 Foro</button>
        <button style="background:#4f545c" onclick="auth.signOut()">Salir</button>
    </div>
</header>

<div id="chat-wrapper">
    <div id="chat"></div>
</div>

<div id="input-area">
    <input id="msg" placeholder="Escribe algo..." onkeypress="if(event.key==='Enter') send()">
    <button class="btn-blue" onclick="send()">ENVIAR</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCVQyiAqSFu00dxVxBv3UVv6qbPx_pPlC4",
        authDomain: "serviciosdelpollito-d7c13.firebaseapp.com",
        projectId: "serviciosdelpollito-d7c13"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // 👑 LISTA DE ADMINS (Pon los dos correos aquí)
    const admins = [
        "victorzanbratorresfarias@gmail.com",
        "tahielgz17@gmail.com"
    ];

    auth.onAuthStateChanged(user => {
        const adminBtn = document.getElementById('admin-link');
        
        if (!user) {
            window.location = "index.html";
        } else {
            // Limpiamos el correo para que no haya errores de espacios o mayúsculas
            const emailActual = user.email.toLowerCase().trim();
            
            console.log("Sesión iniciada como:", emailActual);

            // Si el correo está en la lista, el botón aparece mágicamente
            if (admins.includes(emailActual)) {
                adminBtn.style.display = 'block';
                console.log("¡Eres Admin! Panel activado.");
            }
            
            cargarMensajes();
        }
    });

   function cargarMensajes() {
    const chatDiv = document.getElementById("chat");
    const wrapper = document.getElementById("chat-wrapper");

    // 🕒 1. Ponemos un temporizador de 5 segundos
    const timeoutError = setTimeout(() => {
        if (chatDiv.innerHTML === "" || chatDiv.innerHTML.includes("Cargando")) {
            // Si después de 5 segundos sigue vacío, mostramos el error
            chatDiv.innerHTML = `
                <div style="text-align:center; padding:50px; color:#72767d;">
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCBmYWlsJnB0PW0mcz0w/h4OGa0npayrS2W7RnI/giphy.gif" 
                         style="width:150px; margin-bottom:20px; border-radius:10px;">
                    <h2 style="color:white;">¡Ups! Algo ha ocurrido 🐣</h2>
                    <p>No pudimos cargar los mensajes. Revisa tu conexión o intenta recargar.</p>
                    <button onclick="location.reload()" style="background:#5865f2; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; margin-top:10px;">REINTENTAR</button>
                </div>
            `;
        }
    }, 5000); // 5000 milisegundos = 5 segundos

    // 2. Intentamos cargar desde Firebase
    db.collection("messages").orderBy("fecha", "asc").onSnapshot(snapshot => {
        clearTimeout(timeoutError); // ✅ ¡Éxito! Cancelamos el error porque sí cargó
        chatDiv.innerHTML = "";
        
        snapshot.forEach(doc => {
            const m = doc.data();
            chatDiv.innerHTML += `
                <div class="mensaje-container">
                    <img src="${m.foto || 'https://via.placeholder.com/40'}" class="user-avatar">
                    <div>
                        <span class="user-name">${m.nombre}</span>
                        <div class="message-text">${m.texto}</div>
                    </div>
                </div>`;
        });
        wrapper.scrollTop = wrapper.scrollHeight;
    }, error => {
        // Si Firebase responde con un error de inmediato (como el 403)
        console.error("Error de Firebase:", error);
    });
}

    function send() {
        const input = document.getElementById("msg");
        if (!input.value.trim()) return;
        const user = auth.currentUser;
        db.collection("users").doc(user.uid).get().then(doc => {
            const u = doc.data();
            db.collection("messages").add({
                texto: input.value,
                nombre: u.nombre,
                fecha: Date.now()
            });
            input.value = "";
        });
    }
</script>
</body>
</html>
