<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐥 Polli Chat - Comunidad</title>
    <style>
        :root { --bg-main: #36393f; --bg-side: #2f3136; --bg-input: #40444b; --text-main: #dcddde; --accent: #5865f2; --danger: #ed4245; }
        body { background: var(--bg-main); color: var(--text-main); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--bg-side); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #202225; }
        .nav-buttons { display: flex; gap: 10px; }
        button { border: none; border-radius: 4px; padding: 8px 15px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-blue { background: var(--accent); }
        .btn-admin { background: var(--danger); display: none; } /* Oculto por defecto */
        #chat-wrapper { flex: 1; overflow-y: auto; padding: 20px; }
        .mensaje { margin-bottom: 15px; display: flex; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #202225; }
        .nombre { font-weight: bold; color: white; }
        .texto { font-size: 0.95rem; margin-top: 2px; }
        #input-area { padding: 20px; background: var(--bg-side); display: flex; gap: 10px; }
        input { flex: 1; background: var(--bg-input); border: none; padding: 12px; color: white; border-radius: 5px; outline: none; }
    </style>
</head>
<body>

<header>
    <h1># polli-chat</h1>
    <div class="nav-buttons">
        <button id="admin-link" class="btn-admin" onclick="window.location='admin.html'">👑 PANEL ADMIN</button>
        <button class="btn-blue" onclick="window.location='foro.html'">📌 Foro</button>
        <button style="background:#4f545c" onclick="auth.signOut()">Salir</button>
    </div>
</header>

<div id="chat-wrapper">
    <div id="chat"></div>
</div>

<div id="input-area">
    <input id="msg" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') send()">
    <button class="btn-blue" onclick="send()">ENVIAR</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCVQyiAqSFu00dxVxBv3UVv6qbPx_pPlC4",
        authDomain: "serviciosdelpollito-d7c13.firebaseapp.com",
        projectId: "serviciosdelpollito-d7c13"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

 // 👑 1. LISTA DE ADMINS (Asegúrate de que esté en minúsculas)
const admins = ["tahielgz17@gmail.com"]; 

auth.onAuthStateChanged(user => {
    const adminBtn = document.getElementById('admin-link');
    
    if (!user) {
        window.location = "index.html";
    } else {
        // 🔍 Esto te dirá en la Consola (F12) qué correo detecta el sistema
        console.log("Usuario detectado:", user.email);

        // 🛡️ Verificación mejorada
        if (user.email && admins.includes(user.email.toLowerCase())) {
            if (adminBtn) adminBtn.style.display = 'block';
            console.log("¡Eres Admin! Botón activado 👑");
        } else {
            console.log("No eres admin o el correo no coincide.");
 
            }
            cargarMensajes();
        }
    });

    function cargarMensajes() {
        const chatDiv = document.getElementById("chat");
        db.collection("messages").orderBy("fecha", "asc").onSnapshot(snap => {
            chatDiv.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                chatDiv.innerHTML += `
                    <div class="mensaje">
                        <img src="${m.foto || 'https://via.placeholder.com/40'}" class="avatar">
                        <div>
                            <span class="nombre">${m.nombre}</span>
                            <div class="texto">${m.texto}</div>
                        </div>
                    </div>`;
            });
            document.getElementById("chat-wrapper").scrollTop = document.getElementById("chat-wrapper").scrollHeight;
        });
    }

    function send() {
        const input = document.getElementById("msg");
        if (!input.value.trim()) return;
        const user = auth.currentUser;
        db.collection("users").doc(user.uid).get().then(doc => {
            const u = doc.data();
            db.collection("messages").add({
                texto: input.value,
                nombre: u.nombre,
                foto: u.foto,
                fecha: Date.now()
            });
            input.value = "";
        });
    }
</script>
</body>
</html>
