<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polli chat 🐥 - Login</title>
  <style>
   /* Pantalla de bloqueo total */
#age-verification-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.9); /* Fondo bien oscuro */
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999; /* Por encima de TODO */
}

.age-card {
  background: var(--card-discord);
  padding: 40px;
  border-radius: 8px;
  text-align: center;
  max-width: 400px;
  border: 1px solid var(--accent);
  box-shadow: 0 0 20px rgba(88, 101, 242, 0.3);
}

.age-card h2 { color: white; margin-bottom: 10px; }
.age-card p { color: var(--text-gray); font-size: 14px; margin-bottom: 25px; }

.age-buttons { display: flex; gap: 10px; justify-content: center; }

.btn-age-yes { background: var(--accent); color: white; border: none; padding: 10px 25px; border-radius: 3px; cursor: pointer; font-weight: bold; }
.btn-age-no { background: transparent; color: var(--text-gray); border: 1px solid var(--text-gray); padding: 10px 25px; border-radius: 3px; cursor: pointer; }

.btn-age-yes:hover { background: var(--accent-hover); }
.btn-age-no:hover { background: var(--danger); color: white; border-color: var(--danger); } :root {
      --bg-discord: #36393f;
      --card-discord: #2f3136;
      --text-gray: #b9bbbe;
      --input-bg: #202225;
      --accent: #5865f2;
      --accent-hover: #4752c4;
      --white: #ffffff;
    }@media (max-width: 480px) {
  .login-card {
    width: 90%;
    padding: 20px;
    margin: 10px;
  }
  h1 { font-size: 20px; }
}

    body {
     <div id="age-verification-overlay">
  <div class="age-card">
    <img src="https://i.imgur.com/4ZQZ4ZQ.png" width="80" style="margin-bottom: 15px;">
    <h2>¿Eres mayor de edad? 🐥</h2>
    <p>Para entrar a la Comunidad Pollito debes confirmar que tienes al menos 18 años.</p>
    
    <div class="age-buttons">
      <button class="btn-age-no" onclick="salida()">Soy menor</button>
      <button class="btn-age-yes" onclick="confirmarEdad()">Sí, soy mayor</button>
    </div>
  </div>
</div> margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-discord);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: var(--white);
    }

    .login-card {
      background-color: var(--card-discord);
      padding: 32px;
      border-radius: 8px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }@media (max-width: 600px) {
  header h1 { font-size: 0.9rem; }
  .mensaje-container { padding: 8px 10px; }
  .user-avatar { width: 35px; height: 35px; margin-right: 10px; }
  #msg { padding: 10px; }
}

    /* SPINNER ANIMATION */
    .loader {
      display: none; /* Oculto por defecto */
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin: 0 auto 15px auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: var(--text-gray); margin-bottom: 20px; }

    .form-group { text-align: left; margin-bottom: 20px; }
    label { display: block; color: var(--text-gray); text-transform: uppercase; font-size: 12px; font-weight: bold; margin-bottom: 8px; }

    input {
      width: 100%;
      padding: 10px;
      background-color: var(--input-bg);
      border: 1px solid rgba(0,0,0,0.3);
      border-radius: 3px;
      color: var(--white);
      box-sizing: border-box;
      outline: none;
    }

    input:focus { border-color: var(--accent); }

    .btn-main {
      width: 100%;
      padding: 12px;
      background-color: var(--accent);
      color: white;
      border: none;
      border-radius: 3px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .btn-main:disabled { background-color: var(--accent-hover); opacity: 0.6; cursor: not-allowed; }

    .btn-google {
      width: 100%;
      padding: 10px;
      background-color: transparent;
      color: white;
      border: 1px solid var(--text-gray);
      border-radius: 3px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .footer-links { margin-top: 15px; font-size: 14px; color: var(--text-gray); }
    .footer-links span { color: var(--accent); cursor: pointer; }
  </style>
</head>
<body>

<div class="login-card">
  <div id="loadingSpinner" class="loader"></div>
  <h1>¡Hola de nuevo! 🐥</h1>
  <p>Nuestros usuarios te esperan!!!</p>

  <div class="form-group">
    <label>Correo electrónico</label>
    <input id="email" type="email">
  </div>

  <div class="form-group">
    <label>Contraseña</label>
    <input id="password" type="password">
  </div>

  <button id="loginBtn" class="btn-main" onclick="login()">Iniciar sesión</button>
  <button id="googleBtn" class="btn-google" onclick="loginGoogle()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
    Entrar con Google
  </button>

  <div class="footer-links">
    ¿Necesitas una cuenta? <span onclick="register()">Registrarse</span>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
// --- TU CONFIGURACIÓN ---
const firebaseConfig = {
  apiKey: "AIzaSyCVQyiAqSFu00dxVxBv3UVv6qbPx_pPlC4",
  authDomain: "serviciosdelpollito-d7c13.firebaseapp.com",
  projectId: "serviciosdelpollito-d7c13"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function toggleLoading(isLoading) {
  const spinner = document.getElementById("loadingSpinner");
  const loginBtn = document.getElementById("loginBtn");
  const googleBtn = document.getElementById("googleBtn");
  
  spinner.style.display = isLoading ? "block" : "none";
  loginBtn.disabled = isLoading;
  googleBtn.disabled = isLoading;
  loginBtn.innerText = isLoading ? "Cargando..." : "Iniciar sesión";
}

function register() {
  const e = document.getElementById("email").value;
  const p = document.getElementById("password").value;
  if(!e || !p) return alert("Completa los campos");

  toggleLoading(true);
  auth.createUserWithEmailAndPassword(e, p)
  .then(user => {
    db.collection("users").doc(user.user.uid).set({
      nombre: "Pollito",
      foto: "https://i.imgur.com/4ZQZ4ZQ.png",
      rol: "usuario"
    }).then(() => window.location = "app.html");
  })
  .catch(err => {
    toggleLoading(false);
    alert(err.message);
  });
}

function login() {
  const e = document.getElementById("email").value;
  const p = document.getElementById("password").value;
  if(!e || !p) return alert("Escribe tus datos");

  toggleLoading(true);
  auth.signInWithEmailAndPassword(e, p)
  .then(() => window.location = "app.html")
  .catch(err => {
    toggleLoading(false);
    alert("Error: " + err.message);
  });
}

function loginGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  toggleLoading(true);
  auth.signInWithPopup(provider)
  .then(result => {
    const user = result.user;
    db.collection("users").doc(user.uid).set({
      nombre: user.displayName,
      foto: user.photoURL,
      rol: "usuario"
    }).then(() => window.location = "app.html");
  })
  .catch(err => {
    toggleLoading(false);
    console.log(err);
  });
}
</script>
</body>
</html>
